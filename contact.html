<!-- CONTACT PAGE (contact.html) -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - LoomCraft</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f8f6f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      padding:20px;
    }

    .container{
      background:white;
      padding:50px;
      border-radius:20px;
      width:100%;
      max-width:700px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
      font-size:50px;
      margin-bottom:20px;
      color:#8b5e3c;
    }

    p{
      color:#555;
      margin-bottom:30px;
    }

    input, textarea{
      width:100%;
      padding:15px;
      margin-bottom:20px;
      border:1px solid #ddd;
      border-radius:10px;
      outline:none;
    }

    textarea{
      height:140px;
      resize:none;
    }

    button{
      border:none;
      background:#8b5e3c;
      color:white;
      padding:14px 28px;
      border-radius:40px;
      cursor:pointer;
      font-size:16px;
    }

    .back{
      display:block;
      margin-top:25px;
      text-decoration:none;
      color:#8b5e3c;
      font-weight:bold;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Contact Us</h1>

    <p>
      Send us your textile inquiries and business requirements.
    </p>

    <form>
      <input type="text" placeholder="Your Name">
      <input type="email" placeholder="Your Email">
      <textarea placeholder="Your Message"></textarea>

      <button type="submit">Send Message</button>
    </form>

    <a class="back" href="index.html">Back To Home</a>

  </div>

</body>
</html>
